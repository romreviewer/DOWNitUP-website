server {
    listen 80;
    server_name downitup.com www.downitup.com;
    root /var/www/downitup;  # adjust to your actual site root
    index index.html;

    # Custom 404 page
    error_page 404 /404.html;

    # Clean URLs: serve .html files without extension
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Desktop app update API served by the Node process.
    location /checkupdate/downitup/desktop {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block direct access to .html (redirect to clean URL)
    location ~ ^(.+)\.html$ {
        return 301 $1;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
